<ion-content [fullscreen]="true">
  <div class="background-container"></div>

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Dispensacion</ion-title>
      <ion-buttons slot="end">
        <ion-img src="../../assets/icon/user.png" class="custom-image"></ion-img>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <p>
    <mat-form-field class="custom-form" appearance="outline">
      <mat-label></mat-label>
      <input matInput placeholder="">
      <mat-icon matSuffix></mat-icon>
    </mat-form-field>
  </p>  

  <h1 class="custom-text">-</h1>
  <ion-img src="../../assets/icon/pas.png" class="custom-image1"></ion-img>

  <p>   
    <mat-form-field class="custom-form1" appearance="outline">
      <mat-label></mat-label>
      <input matInput placeholder="">
      <mat-icon matSuffix></mat-icon>
    </mat-form-field>
  </p> 

  <h1 class="custom-text1">Tipo de leche</h1> 

  <!-- Sección para los tipos de leche -->
  <div>
    <section class="example-section1" [formGroup]="lecheForm">
      <div class="checkbox-container1">
        <!-- Itera sobre las opciones de tipos de leche -->
        <div class="checkbox-item1" *ngFor="let option of milkOptions">
          <mat-checkbox [formControlName]="option.key">{{ option.label }}</mat-checkbox>
        </div>
      </div>
    </section>
  </div>

  <h1 class="custom-text2">Registro De Tomas </h1>

  <!-- Sección para los horarios de tomas -->
  <div>
    <section class="example-section" [formGroup]="toppingsForm">
      <div class="checkbox-container">
        <!-- Itera sobre las opciones de horarios de tomas -->
        <div class="checkbox-item" *ngFor="let time of timeSlots">
          <mat-checkbox [formControlName]="time">{{ time }}</mat-checkbox>
        </div>
      </div>
    </section>
  </div>
  <div>
  <h4 class="custom-text3">Calostro Terapia</h4>
</div>
  <div>
    <section class="example-section1" [formGroup]="calostroForm">
      <div class="checkbox-container2">
        <!-- Itera sobre las opciones de tipos de leche -->
        <div class="checkbox-item2" *ngFor="let option of calostro">
          <mat-checkbox [formControlName]="option.key">{{ option.label }}</mat-checkbox>
        </div>
      </div>
    </section>
  </div>
  <div>
  <h4 class="custom-text4">NPO</h4>
</div>
  <div class="radio-container1">
    <mat-radio-group aria-label="Select an option">
      <mat-radio-button value="1"></mat-radio-button>
    </mat-radio-group>
  </div>
  <div>
    <h4 class="custom-text5">Leches disponibles</h4>
  </div>
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="columna1">
        <th mat-header-cell *matHeaderCellDef> Codigo</th>
        <td mat-cell *matCellDef="let element"> {{element.columna1}} </td>
      </ng-container>

      <ng-container matColumnDef="columna2">
        <th mat-header-cell *matHeaderCellDef> Cantidad </th>
        <td mat-cell *matCellDef="let element"> {{element.columna2}} </td>
      </ng-container>
      
      <ng-container matColumnDef="columna3">
        <th mat-header-cell *matHeaderCellDef> KCAL </th>
        <td mat-cell *matCellDef="let element"> {{element.columna2}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
  
<ion-button class="custom-button" [routerLink]="['/registro']"color="fff" appearance="outlined"> REGISTRAR </ion-button>

<ion-button class="custom-button1" [routerLink]="['/pacientes']"color="fff" appearance="outlined"> REGRESAR </ion-button>
</ion-content>
